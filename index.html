<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ular Tangga Figo</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; }
    .fredoka { font-family: 'Fredoka One', cursive; }
    .board-container { aspect-ratio: 1/1; max-width: 1080px; max-height: 100%; }
    .cell-num { font-family: 'Nunito', sans-serif; font-weight: 800; }
    
    @keyframes twinkle { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .star { animation: twinkle 2s ease-in-out infinite; }
    .cloud { animation: float 4s ease-in-out infinite; }
    .bidak-piece { 
      transition: cx 0.3s ease-out, cy 0.3s ease-out;
    }
    
    svg text { pointer-events: none; }
  </style>
  <script>
    const defaultConfig = {
      board_title: "Ular Tangga Figo",
      background_color: "#4FC3F7",
      surface_color: "#FFFFFF",
      text_color: "#2D3436",
      primary_action: "#FF6B6B",
      secondary_action: "#FFD93D"
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.board_title || defaultConfig.board_title;
        const el = document.getElementById('board-title');
        if (el) el.textContent = title;

        document.body.style.background = config.background_color || defaultConfig.background_color;
        
        const boardBg = document.getElementById('board-bg');
        if (boardBg) boardBg.style.background = config.surface_color || defaultConfig.surface_color;

        document.querySelectorAll('.cell-num').forEach(n => {
          n.style.fill = config.text_color || defaultConfig.text_color;
        });

        if (el) el.style.color = config.primary_action || defaultConfig.primary_action;

        const subtitle = document.getElementById('board-subtitle');
        if (subtitle) subtitle.style.color = config.secondary_action || defaultConfig.secondary_action;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
          { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); }},
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); }}
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family || 'Fredoka One',
          set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["board_title", config.board_title || defaultConfig.board_title]
      ])
    });
  </script><!-- Game State -->
  <script>
    const allChallenges = [
      "🧮 2+3=?", "🧮 5+7=?", "🧮 10-3=?", "🧮 4×5=?", "🧮 12÷3=?",
      "🧮 6+4=?", "🧮 15-8=?", "🧮 3×6=?", "🧮 20÷4=?", "🧮 9+9=?",
      "🧮 18-5=?", "🧮 7×2=?", "🧮 16÷2=?", "🧮 11+6=?", "🧮 25-7=?",
      "🧮 8×3=?", "🧮 24÷6=?", "🧮 13+8=?", "🧮 30-12=?", "🧮 5×5=?",
      "🎨 Apa warna bendera Indonesia?", "🦁 Hewan apa yg hidup di hutan?",
      "🌍 Berapa benua di dunia?", "🐠 Ikan hidup di mana?",
      "🌳 Pohon menghasilkan apa?", "🌙 Malam ada apa di langit?",
      "🚗 Berapa roda mobil?", "🦶 Berapa kaki burung?",
      "🍎 Apel warna apa?", "❄️ Es terbuat dari apa?",
      "☀️ Siang ada apa di langit?", "🐝 Lebah menghasilkan apa?",
      "🌹 Bunga warna apa saja?", "🐧 Penguin hidup di mana?",
      "🦑 Gurita punya berapa lengan?", "🐌 Siput punya rumah?",
      "🍌 Pisang warna apa?", "⚽ Bola shape apa?",
      "🏠 Rumah punya berapa sudut?", "✈️ Pesawat terbang ke mana?"
    ];

    let gameState = {
      players: [],
      currentPlayerIdx: 0,
      positions: {},
      gameStarted: false,
      diceRolling: false
    };

    function initGame() {
      const setupModal = document.getElementById('setup-modal');
      const playerInputs = document.querySelectorAll('.player-input');
      const players = [];
      
      playerInputs.forEach(input => {
        const name = input.value.trim();
        if (name) players.push({ name, color: input.dataset.color, position: 1 });
      });

      if (players.length < 2) {
        alert('Masukkan minimal 2 pemain!');
        return;
      }

      gameState.players = players;
      gameState.positions = {};
      players.forEach(p => { gameState.positions[p.name] = 1; });
      gameState.currentPlayerIdx = 0;
      gameState.gameStarted = true;

      setupModal.style.display = 'none';
      document.getElementById('game-container').style.display = 'flex';
      updatePlayerDisplay();
      updateBidak();
    }

    function updatePlayerDisplay() {
      const playersList = document.getElementById('players-list');
      playersList.innerHTML = '';
      gameState.players.forEach((p, idx) => {
        const isActive = idx === gameState.currentPlayerIdx;
        const div = document.createElement('div');
        div.className = `fredoka p-2 rounded text-center transition-all ${isActive ? 'ring-2 ring-yellow-400 scale-105' : ''}`;
        div.style.background = p.color;
        div.style.color = p.position >= 50 ? '#fff' : '#2D3436';
        div.innerHTML = `<div class="font-bold">${p.name}</div><div class="text-sm">📍 Kotak ${p.position}</div>`;
        playersList.appendChild(div);
      });
    }

    function rollDice() {
      if (gameState.diceRolling) return;
      
      gameState.diceRolling = true;
      const diceBtn = document.getElementById('dice-btn');
      diceBtn.disabled = true;
      diceBtn.textContent = '🎲 Mengocok...';

      let rolls = 0;
      const diceInterval = setInterval(() => {
        const randNum = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerHTML = `<span class="text-6xl">🎲</span><div class="text-3xl font-bold text-white">${randNum}</div>`;
        rolls++;
      }, 100);

      setTimeout(() => {
        clearInterval(diceInterval);
        const diceValue = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerHTML = `<span class="text-6xl">🎲</span><div class="text-3xl font-bold text-white">${diceValue}</div>`;
        
        movePlayer(diceValue);
        
        gameState.diceRolling = false;
        diceBtn.disabled = false;
        diceBtn.textContent = '🎲 Kocok Dadu';
      }, 600);
    }

    function movePlayer(steps) {
      const currentPlayer = gameState.players[gameState.currentPlayerIdx];
      let currentPos = currentPlayer.position;
      let stepCount = 0;

      // Move one step at a time with smooth animation
      const moveInterval = setInterval(() => {
        if (stepCount >= steps) {
          clearInterval(moveInterval);
          let newPos = currentPlayer.position;

          // Check for snake/ladder
          const SNAKES = {98:56, 84:43, 62:21, 47:15, 35:7, 91:69};
          const LADDERS = {3:38, 9:31, 20:59, 28:76, 51:87, 63:95, 40:72};

          if (SNAKES[newPos]) {
            setTimeout(() => {
              showMessage(`🐍 Tertangkap ular! Turun ke kotak ${SNAKES[newPos]}`);
              animateMoveToPosition(SNAKES[newPos], () => {
                currentPlayer.position = SNAKES[newPos];
                updateBidak();
                checkWin();
                if (!checkWin()) setTimeout(nextTurn, 1500);
              });
            }, 800);
            return;
          }

          if (LADDERS[newPos]) {
            setTimeout(() => {
              showMessage(`🪜 Naik tangga! Ke kotak ${LADDERS[newPos]}`);
              animateMoveToPosition(LADDERS[newPos], () => {
                currentPlayer.position = LADDERS[newPos];
                updateBidak();
                checkWin();
                if (!checkWin()) setTimeout(nextTurn, 1500);
              });
            }, 800);
            return;
          }

          // Check for challenge
          if ([5, 14, 25, 44, 55, 66, 77, 88, 33, 50].includes(newPos)) {
            showChallenge();
            return;
          }

          updateBidak();
          setTimeout(nextTurn, 1000);
          return;
        }

        stepCount++;
        currentPlayer.position = currentPos + stepCount;
        updateBidak();
      }, 300); // 300ms per step
    }

    function animateMoveToPosition(targetPos, callback) {
      const currentPlayer = gameState.players[gameState.currentPlayerIdx];
      currentPlayer.position = targetPos;
      updateBidak();
      if (callback) callback();
    }

    function showChallenge() {
      const challenge = allChallenges[Math.floor(Math.random() * allChallenges.length)];
      const modal = document.getElementById('challenge-modal');
      document.getElementById('challenge-text').textContent = challenge;
      modal.style.display = 'flex';
    }

    function completeChallenge(success) {
      document.getElementById('challenge-modal').style.display = 'none';
      if (success) {
        showMessage('✅ Berhasil! Lanjut main!');
      }
      setTimeout(nextTurn, 800);
    }

    function nextTurn() {
      gameState.currentPlayerIdx = (gameState.currentPlayerIdx + 1) % gameState.players.length;
      updatePlayerDisplay();
    }

    function checkWin() {
      const winner = gameState.players.find(p => p.position === 100);
      if (winner) {
        const modal = document.getElementById('win-modal');
        document.getElementById('winner-name').textContent = winner.name;
        modal.style.display = 'flex';
        return true;
      }
      return false;
    }

    function showMessage(text) {
      const msg = document.getElementById('message-box');
      msg.textContent = text;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }

    function updateBidak() {
      const svg = document.getElementById('board-svg');
      const bidakGroup = document.getElementById('bidak-group') || (() => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.id = 'bidak-group';
        svg.appendChild(g);
        return g;
      })();
      
      bidakGroup.innerHTML = '';
      gameState.players.forEach((player, idx) => {
        const COLS = 10, ROWS = 10, CELL = 96, PAD = 20;
        const pos = player.position;
        const posIdx = pos - 1;
        const row = Math.floor(posIdx / COLS);
        const colInRow = posIdx % COLS;
        const col = row % 2 === 0 ? colInRow : (COLS - 1 - colInRow);
        const x = PAD + col * CELL + CELL/2;
        const y = PAD + (ROWS - 1 - row) * CELL + CELL/2;
        const offsetX = (idx - gameState.players.length/2) * 8;
        const offsetY = (idx - gameState.players.length/2) * 8;

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', x + offsetX);
        circle.setAttribute('cy', y + offsetY);
        circle.setAttribute('r', '12');
        circle.setAttribute('fill', player.color);
        circle.setAttribute('stroke', '#fff');
        circle.setAttribute('stroke-width', '2');
        circle.setAttribute('class', 'bidak-piece');
        circle.style.transformOrigin = `${x + offsetX} ${y + offsetY}`;
        bidakGroup.appendChild(circle);
      });
    }

    function resetGame() {
      document.getElementById('win-modal').style.display = 'none';
      document.getElementById('setup-modal').style.display = 'flex';
      document.getElementById('game-container').style.display = 'none';
      gameState.gameStarted = false;
      document.querySelectorAll('.player-input').forEach(inp => inp.value = '');
    }
  </script>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full flex items-center justify-center overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
  <!-- Setup Modal -->
  <div id="setup-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
   <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl">
    <h2 class="fredoka text-3xl text-center mb-4" style="color:#FF6B6B;">🎮 Setup Pemain</h2>
    <div id="players-setup" class="space-y-3 mb-6">
     <div>
      <label class="block fredoka text-sm mb-1" style="color:#2D3436;">Pemain 1</label> <input type="text" class="player-input w-full px-3 py-2 border-2 rounded-lg" data-color="#FF6B6B" placeholder="Nama Pemain 1">
     </div>
     <div>
      <label class="block fredoka text-sm mb-1" style="color:#2D3436;">Pemain 2</label> <input type="text" class="player-input w-full px-3 py-2 border-2 rounded-lg" data-color="#6BCB77" placeholder="Nama Pemain 2">
     </div>
     <div>
      <label class="block fredoka text-sm mb-1" style="color:#2D3436;">Pemain 3 (Opsional)</label> <input type="text" class="player-input w-full px-3 py-2 border-2 rounded-lg" data-color="#4D96FF" placeholder="Nama Pemain 3">
     </div>
     <div>
      <label class="block fredoka text-sm mb-1" style="color:#2D3436;">Pemain 4 (Opsional)</label> <input type="text" class="player-input w-full px-3 py-2 border-2 rounded-lg" data-color="#FFD93D" placeholder="Nama Pemain 4">
     </div>
    </div><button onclick="initGame()" class="fredoka w-full py-3 rounded-lg text-white font-bold text-lg transition-all hover:scale-105" style="background:#FF6B6B;">🎲 Mulai Main!</button>
   </div>
  </div><!-- Challenge Modal -->
  <div id="challenge-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" style="display:none;">
   <div class="bg-white rounded-2xl p-6 max-w-sm text-center shadow-2xl">
    <h3 class="fredoka text-2xl mb-4" style="color:#FF6B6B;">🧮 Challenge Matematika!</h3>
    <div id="challenge-text" class="fredoka text-xl mb-6 p-4 bg-yellow-100 rounded-lg" style="color:#2D3436;"></div>
    <div class="flex gap-3">
     <button onclick="completeChallenge(true)" class="flex-1 fredoka py-2 rounded-lg text-white font-bold transition-all hover:scale-105" style="background:#6BCB77;">✅ Benar!</button> <button onclick="completeChallenge(false)" class="flex-1 fredoka py-2 rounded-lg text-white font-bold transition-all hover:scale-105" style="background:#FF6B6B;">❌ Salah</button>
    </div>
   </div>
  </div><!-- Win Modal -->
  <div id="win-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" style="display:none;">
   <div class="bg-white rounded-2xl p-6 max-w-sm text-center shadow-2xl">
    <h3 class="fredoka text-4xl mb-4">🏆</h3>
    <h2 class="fredoka text-3xl mb-2" style="color:#FF6B6B;">Pemenang!</h2>
    <p id="winner-name" class="fredoka text-2xl mb-6" style="color:#6BCB77;"></p><button onclick="resetGame()" class="fredoka w-full py-3 rounded-lg text-white font-bold transition-all hover:scale-105" style="background:#FF6B6B;">🎮 Main Lagi</button>
   </div>
  </div><!-- Message Box -->
  <div id="message-box" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-white px-6 py-3 rounded-full shadow-lg fredoka text-center" style="display:none; z-index:40;"></div><!-- Game Container -->
  <div id="game-container" class="w-full h-full flex flex-col items-center p-2" style="display:none; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   <!-- Top Section: Title & Players (compact) -->
   <div class="text-center mb-1 relative z-10">
    <h1 id="board-title" class="fredoka text-2xl drop-shadow-lg" style="color:#FF6B6B; text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff; margin:0;">Ular Tangga</h1>
    <p id="board-subtitle" class="fredoka text-xs mt-0" style="color:#FFD93D; text-shadow:1px 1px 0 rgba(0,0,0,.15); margin:0;"></p>
   </div><!-- Player Info (compact horizontal) -->
   <div id="players-list" class="w-full flex gap-1 mb-1 justify-center flex-wrap" style="max-width:100%;"></div><!-- Main Content: Board Large + Dice Compact -->
   <div class="flex gap-2 w-full flex-1 items-center justify-center" style="max-width:100%; min-height:0; padding: 0 8px;">
    <!-- Board (large) -->
    <div id="board-bg" class="rounded-xl shadow-lg p-1 relative" style="background:#fff; aspect-ratio:1/1; flex-shrink:0; width: 90vmin; height: 90vmin; display:flex; align-items:center; justify-content:center;">
     <svg id="board-svg" viewbox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; display:block;"></svg>
    </div><!-- Dice Controls (compact right) -->
    <div class="flex flex-col gap-1 justify-center items-center" style="flex-shrink:0;">
     <div id="dice-result" class="flex flex-col items-center justify-center p-3 rounded-lg" style="background:#FFD93D; width:110px; height:110px;">
      <span class="text-5xl">🎲</span>
      <div class="text-sm font-bold text-white fredoka">
       Kocok!
      </div>
     </div><button id="dice-btn" onclick="rollDice()" class="fredoka py-2 px-4 rounded-lg text-white font-bold text-sm transition-all hover:scale-105 w-full" style="background:#FF6B6B;">🎲</button>
     <div class="text-center text-white text-xs fredoka" style="opacity:0.9; width:110px; line-height:1.2;">
      Pemain tersorot siap!
     </div>
    </div>
   </div>
  </div>
  <script>
    const COLS = 10, ROWS = 10, CELL = 96, PAD = 20;
    const svg = document.getElementById('board-svg');

    // Color gradients for cells - creates beautiful flowing gradations
    const cellGradients = [
      ['#FF6B6B', '#FF8E8E'], // Red gradient
      ['#FFD93D', '#FFE066'], // Yellow gradient
      ['#6BCB77', '#8FE0A0'], // Green gradient
      ['#4D96FF', '#7EB3FF'], // Blue gradient
      ['#FF922B', '#FFB366'], // Orange gradient
      ['#CC5DE8', '#E594FF'], // Purple gradient
      ['#20C997', '#5CF9B3'], // Teal gradient
      ['#F06595', '#FF8FB7'], // Pink gradient
      ['#845EF7', '#B69EFF'], // Indigo gradient
      ['#FCC419', '#FFD966'], // Gold gradient
      ['#51CF66', '#82E75C'], // Lime gradient
      ['#339AF0', '#6CB4FF']  // Cyan gradient
    ];

    // Snakes: head -> tail (go down)
    const snakes = [
      {from:98,to:56}, {from:84,to:43}, {from:62,to:21},
      {from:47,to:15}, {from:35,to:7}, {from:91,to:69}
    ];

    // Ladders: bottom -> top (go up)
    const ladders = [
      {from:3,to:38}, {from:9,to:31}, {from:20,to:59},
      {from:28,to:76}, {from:51,to:87}, {from:63,to:95},
      {from:40,to:72}
    ];

    // Special cells with challenges - MATH ONLY
    const specials = {
      5: "🧮",
      14: "🧮",
      25: "🧮",
      44: "🧮",
      55: "🧮",
      66: "🧮",
      77: "🧮",
      88: "🧮",
      33: "🧮",
      50: "🧮"
    };

    // Get cell position (zigzag from bottom-left)
    function cellPos(num) {
      const idx = num - 1;
      const row = Math.floor(idx / COLS);
      const colInRow = idx % COLS;
      const col = row % 2 === 0 ? colInRow : (COLS - 1 - colInRow);
      const x = PAD + col * CELL;
      const y = PAD + (ROWS - 1 - row) * CELL;
      return { x, y, row, col };
    }

    function cellCenter(num) {
      const p = cellPos(num);
      return { cx: p.x + CELL/2, cy: p.y + CELL/2 };
    }

    // Draw board
    let svgContent = '';

    // Background pattern
    svgContent += `<defs>
      <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
      </filter>`;
    
    // Create gradient definitions for each cell color
    cellGradients.forEach((gradient, idx) => {
      svgContent += `<linearGradient id="grad${idx}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:${gradient[0]};stop-opacity:1" />
        <stop offset="100%" style="stop-color:${gradient[1]};stop-opacity:1" />
      </linearGradient>`;
    });
    
    svgContent += `</defs>`;

    // Draw cells
    for (let n = 1; n <= 100; n++) {
      const p = cellPos(n);
      const ci = (p.row + p.col) % cellGradients.length;
      const gradientId = `grad${ci}`;
      const isSpecial = specials[n];
      const isSnakeHead = snakes.find(s => s.from === n);
      const isLadderBottom = ladders.find(l => l.from === n);

      svgContent += `<rect x="${p.x}" y="${p.y}" width="${CELL}" height="${CELL}" rx="8" ry="8" fill="url(#${gradientId})" opacity="0.7" stroke="url(#${gradientId})" stroke-width="2"/>`;
      
      // Highlight border for depth
      svgContent += `<rect x="${p.x+2}" y="${p.y+2}" width="${CELL-4}" height="${CELL-4}" rx="6" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>`;

      // Number
      const fontSize = n === 100 || n === 1 ? 18 : 14;
      svgContent += `<text class="cell-num" x="${p.x+8}" y="${p.y+18}" font-size="${fontSize}" fill="#fff" font-weight="800" text-shadow="1px 1px 2px rgba(0,0,0,0.3)">${n}</text>`;

      // Special cells - just show emoji
      if (isSpecial) {
        svgContent += `<text x="${p.x+CELL/2}" y="${p.y+62}" text-anchor="middle" font-size="20">${specials[n]}</text>`;
      }

      // START / FINISH markers
      if (n === 1) {
        svgContent += `<text x="${p.x+CELL/2}" y="${p.y+60}" text-anchor="middle" font-size="13" font-weight="800" fill="#fff" text-shadow="1px 1px 2px rgba(0,0,0,0.4)">🏁 START</text>`;
      }
      if (n === 100) {
        svgContent += `<text x="${p.x+CELL/2}" y="${p.y+55}" text-anchor="middle" font-size="13" font-weight="800" fill="#fff" text-shadow="1px 1px 2px rgba(0,0,0,0.4)">🏆 FINISH</text>`;
        svgContent += `<text x="${p.x+CELL/2}" y="${p.y+75}" text-anchor="middle" font-size="20">🎉</text>`;
      }
    }

    // Draw ladders
    ladders.forEach(l => {

      // Rungs
      const steps = 5;
      for (let i = 1; i < steps; i++) {

        const rx1 = b.cx - dx + (t.cx - dx - b.cx + dx) * t2;
        const ry1 = b.cy + (t.cy - b.cy) * t2;

      const t = cellCenter(s.to);

      const midY = (h.cy + t.cy) / 2;
      
      // Curved snake body
      const snakeColors = ['#FF6B6B','#CC5DE8','#20C997','#FF922B','#339AF0','#F06595'];
      const sc = snakeColors[Math.floor(Math.random() * snakeColors.length)];
      
      svgContent += `<path d="M${h.cx},${h.cy} Q${midX},${midY} ${t.cx},${t.cy}" fill="none" stroke="${sc}" stroke-width="8" stroke-linecap="round" opacity="0.8"/>`;
      svgContent += `<path d="M${h.cx},${h.cy} Q${midX},${midY} ${t.cx},${t.cy}" fill="none" stroke="${sc}" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="2 8"/>`;
      
      // Snake head (emoji)
      svgContent += `<text x="${h.cx}" y="${h.cy+6}" text-anchor="middle" font-size="22">🐍</text>`;
      // Snake tail
      svgContent += `<text x="${t.cx}" y="${t.cy+5}" text-anchor="middle" font-size="14">💫</text>`;
    });

    // Decorative elements on board (TIDAK di petak special/snake/ladder)
    const decoPositions = [

      {n:27,e:'🍎'},{n:32,e:'📝'},{n:36,e:'🚀'},{n:39,e:'🎯'},
      {n:41,e:'🌟'},{n:45,e:'🎪'},{n:48,e:'🎭'},{n:52,e:'🎨'},{n:56,e:'🎸'},
      {n:60,e:'🎲'},{n:64,e:'🎯'},{n:68,e:'🎪'},{n:72,e:'🎨'},{n:76,e:'🌟'},
      {n:80,e:'🦋'},{n:85,e:'🌈'},{n:92,e:'🚀'},{n:99,e:'🎉'}
    ];
    decoPositions.forEach(d => {

        const p = cellPos(d.n);
        svgContent += `<text x="${p.x+CELL/2}" y="${p.y+62}" text-anchor="middle" font-size="20">${d.e}</text>`;
      }
    });

    svg.innerHTML += svgContent;
